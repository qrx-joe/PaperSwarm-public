<!DOCTYPE html>
<html lang="zh-CN">

<title>PaperSwarm · 蜂群评审事件回放</title>
<style>
/* 设计系统 —— 移植自 D:/code/Apple/components.html（平铺面板版） */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --apple-blue:#007AFF; --apple-blue-hover:#0056CC;
  --apple-green:#34C759; --apple-red:#FF3B30; --apple-orange:#FF9500;
  --apple-yellow:#FFCC00; --apple-purple:#AF52DE; --apple-pink:#FF2D55;
  --apple-teal:#5AC8FA; --apple-indigo:#5856D6;
  --gray-50:#F9FAFB; --gray-100:#F5F5F7; --gray-200:#E8E8ED; --gray-300:#D2D2D7;
  --gray-400:#AEAEB2; --gray-500:#8E8E93; --gray-600:#636366; --gray-700:#48484A;
  --gray-800:#3A3A3C; --gray-900:#1D1D1F;
  --radius-sm:8px; --radius-md:12px; --radius-lg:16px; --radius-xl:20px; --radius-2xl:28px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 12px rgba(0,0,0,.08),0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.12),0 4px 12px rgba(0,0,0,.06);
  --shadow-xl:0 24px 60px rgba(0,0,0,.16),0 8px 20px rgba(0,0,0,.08);
  --t-fast:.15s cubic-bezier(.25,.1,.25,1); --t-base:.25s cubic-bezier(.25,.1,.25,1);
  --text-xs:12px; --text-sm:14px; --text-base:17px; --text-lg:20px; --text-xl:24px;
  --text-2xl:28px; --text-3xl:34px;
  --leading-tight:1.1; --leading-snug:1.25; --leading-normal:1.47; --leading-relaxed:1.6;
  --font-system:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue','PingFang SC','Microsoft YaHei',sans-serif;
  --font-mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Liberation Mono',monospace;
  --bg-primary:#FFFFFF; --bg-secondary:var(--gray-100); --bg-tertiary:var(--gray-200);
  --text-primary:var(--gray-900); --text-secondary:var(--gray-600); --text-tertiary:var(--gray-500);
  --border-color:var(--gray-200);
}
@media (prefers-color-scheme:dark){
  :root{
    --bg-primary:#000000; --bg-secondary:#1C1C1E; --bg-tertiary:#2C2C2E;
    --text-primary:#F5F5F7; --text-secondary:#A1A1A6; --text-tertiary:#8E8E93;
    --border-color:#38383A;
    --shadow-sm:0 1px 3px rgba(0,0,0,.2); --shadow-md:0 4px 12px rgba(0,0,0,.3);
    --shadow-lg:0 12px 40px rgba(0,0,0,.4); --shadow-xl:0 24px 60px rgba(0,0,0,.5);
  }
}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
body{font-family:var(--font-system);font-size:var(--text-base);line-height:var(--leading-normal);
  color:var(--text-primary);background:var(--bg-secondary);min-height:100vh}

/* 导航（毛玻璃 sticky + 流程 chip） */
.nav-bar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.72);
  backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border-color)}
@media (prefers-color-scheme:dark){.nav-bar{background:rgba(28,28,30,.72)}}
.nav-inner{max-width:1080px;margin:0 auto;padding:0 20px;height:52px;display:flex;
  align-items:center;justify-content:space-between;gap:16px}
.nav-logo{font-size:var(--text-lg);font-weight:700;letter-spacing:-.02em;display:flex;align-items:center;gap:7px;white-space:nowrap}
.nav-logo .dot{font-size:18px}
.nav-process{display:flex;gap:6px;align-items:center;flex:1;justify-content:center;overflow-x:auto;scrollbar-width:none}
.nav-process::-webkit-scrollbar{display:none}
.nav-process .chip{padding:5px 11px;font-size:var(--text-xs);white-space:nowrap}
.nav-process .chip .cnt{opacity:.55;margin-left:4px;font-variant-numeric:tabular-nums}
.nav-actions{display:flex;gap:8px;align-items:center;white-space:nowrap}

/* 布局 */
.wrap{max-width:1080px;margin:0 auto;padding:32px 20px 96px}
.page-head{margin-bottom:28px}
.eyebrow{font-size:var(--text-xs);font-weight:600;color:var(--apple-orange);text-transform:uppercase;
  letter-spacing:.08em;margin-bottom:10px}
.page-head h1{font-size:var(--text-2xl);font-weight:700;letter-spacing:-.025em;line-height:var(--leading-tight);margin-bottom:10px}
.page-head p{font-size:var(--text-base);color:var(--text-secondary);max-width:70ch;line-height:var(--leading-relaxed)}
.page-head p b{color:var(--text-primary)}

/* 指标 stat-card */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:22px 0}
@media(max-width:720px){.stat-grid{grid-template-columns:repeat(2,1fr)}}
.stat-card{background:var(--bg-primary);border-radius:var(--radius-xl);border:1px solid var(--border-color);padding:20px;transition:box-shadow var(--t-base)}
.stat-card:hover{box-shadow:var(--shadow-md)}
.stat-icon{width:38px;height:38px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:12px}
.stat-icon-blue{background:rgba(0,122,255,.12)} .stat-icon-purple{background:rgba(175,82,222,.12)}
.stat-icon-orange{background:rgba(255,149,0,.12)} .stat-icon-red{background:rgba(255,59,48,.12)}
.stat-icon-green{background:rgba(52,199,89,.12)}
.stat-value{font-size:var(--text-3xl);font-weight:700;letter-spacing:-.03em;line-height:1;margin-bottom:4px;font-variant-numeric:tabular-nums}
.stat-label{font-size:var(--text-sm);color:var(--text-secondary)}
.stat-sub{font-size:var(--text-xs);color:var(--text-tertiary);margin-top:6px}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;font-size:var(--text-xs);
  font-weight:600;border-radius:980px;line-height:1.4;white-space:nowrap}
.badge-blue{background:rgba(0,122,255,.12);color:var(--apple-blue)}
.badge-green{background:rgba(52,199,89,.14);color:#248A3D}
.badge-red{background:rgba(255,59,48,.12);color:#D70015}
.badge-orange{background:rgba(255,149,0,.14);color:#C93400}
.badge-purple{background:rgba(175,82,222,.12);color:var(--apple-purple)}
.badge-gray{background:rgba(142,142,147,.14);color:var(--text-secondary)}
.badge-teal{background:rgba(90,200,250,.16);color:#0a84c5}
.badge-indigo{background:rgba(88,86,214,.14);color:#5856D6}
@media(prefers-color-scheme:dark){
  .badge-green{color:var(--apple-green)} .badge-red{color:var(--apple-red)}
  .badge-orange{color:var(--apple-orange)} .badge-teal{color:var(--apple-teal)} .badge-indigo{color:#8A89F0}
}

/* Chip */
.chip{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;font-size:var(--text-sm);
  font-weight:500;border:1.5px solid var(--border-color);border-radius:980px;background:transparent;
  color:var(--text-primary);cursor:pointer;transition:all var(--t-fast);font-family:var(--font-system)}
.chip:hover{border-color:var(--gray-400);background:var(--gray-50)}
@media(prefers-color-scheme:dark){.chip:hover{background:var(--gray-800)}}
.chip-active{background:var(--text-primary)!important;color:var(--bg-primary)!important;border-color:var(--text-primary)!important}
.chip-sm{padding:3px 10px;font-size:var(--text-xs);font-family:var(--font-mono);border-width:1px}
.chip-ref:hover{border-color:var(--apple-blue);color:var(--apple-blue);background:rgba(0,122,255,.06)}
.chip-ref.revref:hover{border-color:var(--apple-purple);color:var(--apple-purple);background:rgba(175,82,222,.06)}

/* Card */
.card{background:var(--bg-primary);border-radius:var(--radius-xl);border:1px solid var(--border-color);
  padding:22px 24px;margin-bottom:14px;transition:box-shadow var(--t-base),transform var(--t-base);scroll-margin-top:70px}
.card:hover{box-shadow:var(--shadow-md)}
.card.flash{box-shadow:0 0 0 3px rgba(0,122,255,.35);animation:flash 1.4s ease}
@keyframes flash{0%{box-shadow:0 0 0 0 rgba(0,122,255,.4)}100%{box-shadow:0 0 0 8px rgba(0,122,255,0)}}
.card-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
.card-role{font-weight:650;font-size:var(--text-base);letter-spacing:-.01em}
.card-id{margin-left:auto;font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);
  background:var(--bg-secondary);padding:3px 9px;border-radius:var(--radius-sm)}
.card-claim{font-size:15.5px;color:var(--text-primary);line-height:var(--leading-snug);margin-bottom:12px}
.card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.card-sec{margin-top:13px;font-size:var(--text-sm);color:var(--text-secondary);line-height:var(--leading-relaxed)}
.quote{display:block;font-family:var(--font-mono);font-size:12.5px;background:var(--bg-secondary);
  padding:9px 12px;border-radius:var(--radius-sm);color:var(--text-primary);margin-top:2px;white-space:pre-wrap;line-height:1.5}

/* Alert */
.alert{padding:14px 18px;border-radius:var(--radius-md);display:flex;gap:12px;align-items:flex-start;
  font-size:var(--text-sm);line-height:var(--leading-normal)}
.alert-icon{font-size:17px;flex-shrink:0;margin-top:1px}
.alert-info{background:rgba(0,122,255,.08);color:var(--apple-blue);border:1px solid rgba(0,122,255,.16)}
.alert-success{background:rgba(52,199,89,.08);color:#248A3D;border:1px solid rgba(52,199,89,.16)}
.alert-warning{background:rgba(255,149,0,.09);color:#C93400;border:1px solid rgba(255,149,0,.18)}
.alert-error{background:rgba(255,59,48,.08);color:#D70015;border:1px solid rgba(255,59,48,.16)}
@media(prefers-color-scheme:dark){.alert-success{color:var(--apple-green)}.alert-warning{color:var(--apple-orange)}.alert-error{color:var(--apple-red)}}
.alert-body{flex:1;min-width:0}
.alert-body .kv{display:inline-flex;gap:6px;align-items:center;margin-right:14px;flex-wrap:wrap}
.alert-body .k{font-size:11px;text-transform:uppercase;letter-spacing:.04em;opacity:.7;font-weight:600}
.alert .note{margin-top:8px;font-size:12.5px;opacity:.85;line-height:var(--leading-relaxed);border-top:1px solid currentColor;padding-top:8px;border-color:rgba(255,149,0,.2)}

.list-group{background:var(--bg-primary);border-radius:var(--radius-lg);border:1px solid var(--border-color);overflow:hidden}
.list-item{display:flex;align-items:flex-start;gap:13px;padding:14px 18px;border-bottom:1px solid var(--border-color);transition:background var(--t-fast)}
.list-item:last-child{border-bottom:none}
.list-item:hover{background:var(--gray-50)}
@media(prefers-color-scheme:dark){.list-item:hover{background:var(--gray-800)}}
.list-item-icon{width:30px;height:30px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0;background:rgba(255,59,48,.12);color:var(--apple-red)}
.list-item-content{flex:1;min-width:0}
.list-item-title{font-size:var(--text-sm);font-weight:600}
.list-item-subtitle{font-size:var(--text-xs);color:var(--text-tertiary);margin-top:3px;line-height:var(--leading-normal)}
.list-item-value{font-family:var(--font-mono);font-size:var(--text-xs);color:var(--text-tertiary);background:var(--bg-secondary);padding:3px 8px;border-radius:var(--radius-sm);flex-shrink:0}

/* Section / Panel */
.panel{margin-top:34px;scroll-margin-top:66px}
.panel-head{display:flex;align-items:baseline;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.panel-head h2{font-size:var(--text-xl);font-weight:700;letter-spacing:-.02em}
.panel-head .num{font-family:var(--font-mono);font-size:var(--text-sm);color:var(--apple-orange);font-weight:700}
.panel-head .sub{font-size:var(--text-sm);color:var(--text-tertiary);flex-basis:100%;line-height:var(--leading-normal)}

/* 蜂群价值高亮 */
.swarm-hit{display:flex;align-items:center;gap:9px;background:linear-gradient(90deg,rgba(52,199,89,.12),transparent);
  border:1px solid rgba(52,199,89,.22);border-radius:var(--radius-md);padding:10px 14px;margin-top:13px;
  font-size:var(--text-sm);color:#1c7a3e}
@media(prefers-color-scheme:dark){.swarm-hit{color:var(--apple-green)}}

/* diff */
.diff{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px}
@media(max-width:640px){.diff{grid-template-columns:1fr}}
.diff .col{border:1px solid var(--border-color);border-radius:var(--radius-md);overflow:hidden}
.diff .col .ct{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;padding:6px 11px;color:#fff}
.diff .col.before .ct{background:var(--gray-400)} .diff .col.after .ct{background:var(--apple-green)}
@media(prefers-color-scheme:dark){.diff .col.before .ct{background:var(--gray-600)}}
.diff .col .cb{padding:11px 13px;font-size:13px;white-space:pre-wrap;color:var(--text-primary);line-height:1.55;font-family:var(--font-mono)}

/* 折叠 / 工具 */
details.acc{margin-top:10px}
details.acc>summary{cursor:pointer;font-size:var(--text-xs);font-weight:600;color:var(--apple-blue);
  list-style:none;user-select:none;display:inline-flex;align-items:center;gap:4px}
details.acc>summary::-webkit-details-marker{display:none}
details.acc>summary::before{content:"▾";color:var(--text-tertiary);transition:transform var(--t-fast);font-size:10px}
details.acc:not([open])>summary::before{transform:rotate(-90deg)}
details.acc>div{margin-top:9px}
.lab{font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--text-tertiary);font-weight:700;margin-right:6px}
.mono{font-family:var(--font-mono)}
.muted{color:var(--text-tertiary)}
.tiny{font-size:var(--text-xs)}
.sides{display:flex;gap:12px;flex-wrap:wrap;margin-top:11px}
.side{flex:1;min-width:220px;border:1px solid var(--border-color);border-radius:var(--radius-md);padding:11px 13px;background:var(--bg-secondary)}
.side .pos{font-size:var(--text-xs);font-weight:700;color:var(--text-secondary);margin-bottom:4px}

/* Toast */
.toast{position:fixed;top:68px;right:20px;z-index:300;display:flex;align-items:center;gap:10px;
  padding:12px 18px;background:var(--bg-primary);border-radius:var(--radius-lg);box-shadow:var(--shadow-xl);
  border:1px solid var(--border-color);max-width:380px;font-size:var(--text-sm);
  opacity:0;transform:translateX(20px) scale(.96);transition:all var(--t-base);pointer-events:none}
.toast.show{opacity:1;transform:translateX(0) scale(1)}
.toast .ico{font-size:17px}

footer.foot{margin-top:44px;color:var(--text-tertiary);font-size:var(--text-xs);border-top:1px solid var(--border-color);padding-top:16px;line-height:var(--leading-relaxed)}
</style>
</head>

<script>
"use strict";
/* PaperSwarm 事件回放 UI —— 平铺面板版（Apple 设计系统） */

const TENSION={factual_disagreement:['事实分歧','red'],methodological_gap:['方法论缺口','purple'],novelty_vs_evidence:['新颖性 vs 证据','indigo'],scope_tradeoff:['范围权衡','teal'],ethical_or_safety_risk:['伦理/安全风险','orange'],clarity_vs_substance:['清晰 vs 实质','gray']};
const VERDICT={adopt:['采纳','green'],reject:['驳回','red'],partial:['部分采纳','orange'],request_reargument:['要求重新论证','blue']};
const DM={human:['人类作者','green'],ai_simulated:['AI 代拟','orange'],editor_agent:['编辑 Agent','blue']};
const VSTATE={fixed:['已修复','green'],partial:['部分修复','orange'],unfixed:['未修复','gray'],regression:['回归','red']};
const PRODUCED={produced_by_agent:['Agent 原生','green'],system_derived:['系统派生','blue'],human_decision:['人类裁决','purple'],human_annotation:['人工标注','gray']};
const SRCCONF={direct:['来源·直接','green'],inferred:['来源·推断','orange'],missing:['来源·缺失','red']};
const SEV={critical:['致命','red'],major:['重大','orange'],minor:['次要','gray']};
const CONF={high:['高置信','green'],medium:['中置信','orange'],low:['低置信','gray']};
const EVSTR={strong:['强证据','green'],moderate:['中等证据','orange'],weak:['弱证据','gray']};
const KIND={baseline:'baseline 对照（单 LLM）',editor:'编辑',method:'方法学',domain:'领域',devil:'魔鬼代言人',statistician:'统计',reproducibility:'可复现',ethicist:'伦理',worker:'Worker',verifier:'Verifier',lead:'Lead'};
const DIM={1:'① 原创与贡献',2:'② 方法严谨性',3:'③ 证据与可复现性',4:'④ 论证与表达',5:'⑤ 规范与伦理'};
const CONFTYPE={consensus:'共识（多角色收敛）',dissent:'分歧（需裁决）'};

function h(tag,attrs,...children){
  const e=document.createElement(tag);
  if(attrs)for(const[k,v]of Object.entries(attrs)){
    if(v==null||v===false)continue;
    if(k==='class')e.className=v;
    else if(k.startsWith('on')&&typeof v==='function')e.addEventListener(k.slice(2),v);
    else if(k==='dataset')Object.assign(e.dataset,v);
    else e.setAttribute(k,v);
  }
  for(const c of children.flat(Infinity)){
    if(c==null||c===false||c===true)continue;
    e.appendChild(typeof c==='object'?c:document.createTextNode(String(c)));
  }
  return e;
}
const badge=(text,cls,title)=>h('span',{class:'badge badge-'+(cls||'gray'),title:title||''},text);
const B=(map,val,title)=>{if(!val)return null;const v=map[val]||[val,'gray'];return badge(v[0],v[1],title);};

function buildIndex(data){
  const evs=data.events||[];
  const byId={}; evs.forEach(e=>byId[e.event_id]=e);
  const refBy={}; const add=(s,t)=>{ if(!t||!byId[t])return; (refBy[t]||(refBy[t]=new Set())).add(s); };
  evs.forEach(e=>{const p=e.payload||{},lin=e.lineage||{};
    (p.finding_refs||[]).forEach(t=>add(e.event_id,t));
    ['resolves','resolves_to','enacts','derived_from'].forEach(k=>(lin[k]||[]).forEach(t=>add(e.event_id,t)));
  });
  return {data,evs,byId,refBy, of:(t)=>evs.filter(e=>e.event_type===t)};
}
function refChip(id,opts){
  opts=opts||{};
  return h('span',{class:'chip chip-sm chip-ref'+(opts.reverse?' revref':''),title:opts.title||('跳转到 '+id),onclick:()=>jumpTo(id)},'↪ ',id);
}
function sourceBlock(e){
  const s=e.source; if(!s)return null;
  const kids=[h('span',{class:'lab'},'字段来源'),B(SRCCONF,s.confidence)];
  if(s.from)kids.push(h('span',{class:'muted tiny'},' · ',h('code',null,s.from)));
  const blk=h('div',{class:'card-sec'},...kids);
  if(s.confidence==='inferred'){
    blk.appendChild(h('details',{class:'acc'},
      h('summary',null,'推断依据（inferred 须举证）'),
      h('div',null,
        s.inferred_method?h('div',{class:'tiny'},h('span',{class:'lab'},'推断方法'),s.inferred_method):null,
        s.inferred_from?h('div',{class:'tiny',style:'margin-top:4px'},h('span',{class:'lab'},'推断自'),s.inferred_from):null)));
  }
  return blk;
}
function revRefBlock(ix,id){
  const set=ix.refBy[id]; if(!set||!set.size)return null;
  return h('div',{class:'card-sec'},h('span',{class:'lab'},'被引用于'),
    ...[...set].map(s=>refChip(s,{reverse:true,title:'反向 lineage：被 '+s+' 引用'})));
}
function jumpTo(id){
  const card=document.querySelector('[data-eid="'+(window.CSS?CSS.escape(id):id)+'"]');
  if(!card){toast('未找到事件 '+id,'⚠');return;}
  card.querySelectorAll('details').forEach(d=>d.open=true);
  card.scrollIntoView({behavior:'smooth',block:'center'});
  card.classList.remove('flash');void card.offsetWidth;card.classList.add('flash');
}

function findingCard(e,ix,isBaseline){
  const p=e.payload||{};
  const head=[h('span',{class:'badge badge-'+(isBaseline?'gray':'blue')},isBaseline?'BASELINE':'评审发现'),
    h('span',{class:'card-role'},KIND[e.agent_kind]||e.agent_kind||'评审'),h('span',{class:'card-id'},e.event_id)];
  const meta=[];
  if(p.severity)meta.push(B(SEV,p.severity));
  if(p.confidence_level)meta.push(B(CONF,p.confidence_level));
  if(p.evidence_strength)meta.push(B(EVSTR,p.evidence_strength));
  if(p.dimension)meta.push(badge(DIM[p.dimension]||('维度 '+p.dimension),'gray','对齐 rubric 5 维度'));
  meta.push(B(PRODUCED,e.produced_by));
  if(p.target_section&&(p.target_section.section||p.target_section.line_range))
    meta.push(h('span',{class:'badge badge-gray'},'§ ',p.target_section.section||'',p.target_section.line_range?(' · '+p.target_section.line_range):''));
  const body=[h('div',{class:'card-claim'},p.claim||'(无 claim)')];
  if(meta.length)body.push(h('div',{class:'card-meta'},...meta));
  if(p.evidence||p.reasoning)body.push(h('details',{class:'acc'},
    h('summary',null,'证据 / 对抗性推理'),
    h('div',null,
      p.evidence?h('div',{class:'card-sec',style:'margin-top:0'},h('span',{class:'lab'},'证据'),h('span',{class:'quote'},p.evidence)):null,
      p.reasoning?h('div',{class:'card-sec'},h('span',{class:'lab'},'推理'),p.reasoning):null)));
  body.push(sourceBlock(e),revRefBlock(ix,e.event_id));
  return h('div',{class:'card','data-eid':e.event_id},h('div',{class:'card-head'},...head),...body);
}
function conflictCard(e,ix){
  const p=e.payload||{};
  const head=[h('span',{class:'badge badge-purple'},'冲突'),h('span',{class:'card-role'},'冲突'),
    p.type?h('span',{class:'badge badge-gray'},CONFTYPE[p.type]||p.type):null,
    p.tension_type?badge(TENSION[p.tension_type][0],TENSION[p.tension_type][1],'tension_type 张力分类'):null,
    h('span',{class:'card-id'},e.event_id)];
  const meta=[];
  if(p.severity)meta.push(B(SEV,p.severity));
  if(p.confidence_level)meta.push(B(CONF,p.confidence_level));
  meta.push(B(PRODUCED,e.produced_by));
  const body=[h('div',{class:'card-claim'},p.summary||(p.type==='consensus'?'多角色收敛的共识问题':'需裁决的分歧'))];
  if(meta.length)body.push(h('div',{class:'card-meta'},...meta));
  if(p.type==='consensus'&&(p.finding_refs||[]).length>=2)
    body.push(h('div',{class:'swarm-hit'},h('span',null,'⚡'),
      h('span',null,h('b',null,'蜂群价值：'),(p.finding_refs||[]).length,' 个独立角色在不相交 context 下收敛到同一结论——单 agent 易漏，多角色交叉坐实。')));
  if(p.finding_refs&&p.finding_refs.length)
    body.push(h('div',{class:'card-meta'},h('span',{class:'lab'},'引用发现'),...p.finding_refs.map(r=>refChip(r))));
  body.push(sourceBlock(e),revRefBlock(ix,e.event_id));
  return h('div',{class:'card','data-eid':e.event_id},h('div',{class:'card-head'},...head),...body);
}
function decisionCard(e,ix){
  const p=e.payload||{},dm=e.decision_maker;
  const head=[h('span',{class:'badge badge-orange'},'裁决'),h('span',{class:'card-role'},'作者裁决'),
    dm?badge((dm==='human'?'✓ ':'⚠ ')+DM[dm][0],DM[dm][1],'decision_maker：'+(dm==='ai_simulated'?'本裁决由 executor 代拟，非真人作者在环':'权威裁决者')):null,
    p.verdict?B(VERDICT,p.verdict):null,h('span',{class:'card-id'},e.event_id)];
  const meta=[];
  if(e.lineage&&e.lineage.resolves&&e.lineage.resolves.length)
    meta.push(h('span',{class:'lab'},'裁决对象'),...e.lineage.resolves.map(r=>refChip(r,{title:'跳转到本裁决处理的冲突 '+r})));
  meta.push(B(PRODUCED,e.produced_by));
  const body=[];
  if(p.rationale)body.push(h('div',{class:'card-claim',style:'margin-bottom:10px'},p.rationale));
  if(p.selected_position)body.push(h('div',{class:'card-sec',style:'margin-top:0'},h('span',{class:'lab'},'采纳立场'),p.selected_position));
  if(meta.length)body.push(h('div',{class:'card-meta'},...meta));
  body.push(sourceBlock(e),revRefBlock(ix,e.event_id));
  return h('div',{class:'card','data-eid':e.event_id},h('div',{class:'card-head'},...head),...body);
}
function revisionCard(e,ix){
  const p=e.payload||{};
  const head=[h('span',{class:'badge badge-green'},'修改'),h('span',{class:'card-role'},KIND[e.agent_kind]||'修改'),
    p.verifier_state?B(VSTATE,p.verifier_state):null,
    p.round?badge('第 '+p.round+' 轮','gray','Worker/Verifier 对抗轮次'):null,
    h('span',{class:'card-id'},e.event_id)];
  const meta=[];
  if(e.lineage&&e.lineage.enacts&&e.lineage.enacts.length)
    meta.push(h('span',{class:'lab'},'执行自'),...e.lineage.enacts.map(r=>refChip(r,{title:'跳转到触发本修改的裁决 '+r})));
  meta.push(B(PRODUCED,e.produced_by));
  const body=[];
  if(p.before||p.after)body.push(h('div',{class:'diff'},
    h('div',{class:'col before'},h('div',{class:'ct'},'改前 before'),h('div',{class:'cb'},p.before||'(无)')),
    h('div',{class:'col after'},h('div',{class:'ct'},'改后 after'),h('div',{class:'cb'},p.after||'(无)'))));
  if(p.target_section&&(p.target_section.section||p.target_section.line_range))
    body.push(h('div',{class:'card-sec'},h('span',{class:'lab'},'位置'),'§ ',p.target_section.section||'',p.target_section.line_range?(' · '+p.target_section.line_range):''));
  if(meta.length)body.push(h('div',{class:'card-meta'},...meta));
  body.push(sourceBlock(e),revRefBlock(ix,e.event_id));
  return h('div',{class:'card','data-eid':e.event_id},h('div',{class:'card-head'},...head),...body);
}

let CURRENT=null;
function render(data,sourceLabel){
  const ix=buildIndex(data); CURRENT={ix,sections:[]};
  const app=document.getElementById('app'); app.innerHTML='';
  const meta=data.paper_meta||{}, prov=data.provenance||{};

  app.appendChild(h('header',{class:'page-head'},
    h('div',{class:'eyebrow'},'可审计事件回放 · Audit Replay'),
    h('h1',null,'让蜂群评审过程，可观察、可追溯'),
    h('p',null,'一次评审被压成带 ',h('b',null,'lineage 因果边'),' 的事件流：',h('b',null,'发现 → 冲突 → 裁决 → 修改'),
      '。这不是「上传论文生成报告」的 chat 壳，而是一面让多智能体过程可见的镜子。点击任何引用 chip 可在事件间跳转。')));

  const revN=ix.of('reviewer_judgment').length, cflN=ix.of('conflict').length;
  const decs=ix.of('decision'), gapN=(data.gaps||[]).length;
  const humanN=decs.filter(d=>d.decision_maker==='human').length, aiN=decs.filter(d=>d.decision_maker==='ai_simulated').length;
  app.appendChild(h('div',{class:'stat-grid'},
    stat('📋','blue',revN,'评审发现','多角色并行 finding'),
    stat('⚡','purple',cflN,'冲突 / 张力','tension 分类'),
    stat('⚖','orange',decs.length,'作者裁决',humanN+' 人类 / '+aiN+' AI 代拟'),
    stat('⚠','red',gapN,'缺口登记','学术诚信守门')));
  function stat(ico,color,val,label,sub){
    return h('div',{class:'stat-card'},
      h('div',{class:'stat-icon stat-icon-'+color},ico),
      h('div',{class:'stat-value'},String(val)),
      h('div',{class:'stat-label'},label),
      sub?h('div',{class:'stat-sub'},sub):null);
  }

  const warn=!prov.human_in_loop;
  app.appendChild(h('div',{class:'alert alert-'+(warn?'warning':'success')},
    h('div',{class:'alert-icon'},warn?'⚠':'✓'),
    h('div',{class:'alert-body'},
      h('span',{class:'kv'},h('span',{class:'k'},'run'),h('span',{class:'mono'},data.run_id||'-')),
      h('span',{class:'kv'},h('span',{class:'k'},'论文'),(meta.paper_type||'-')+' · '+(meta.discipline||'')),
      h('span',{class:'kv'},h('span',{class:'k'},'人类在环'),prov.human_in_loop?'是':'否'),
      h('span',{class:'kv'},h('span',{class:'k'},'数据来源'),prov.events_origin==='harvester'?'机器抽取 harvester':'手工样例 manual_demo'),
      h('span',{class:'kv'},h('span',{class:'k'},'当前'),h('span',{class:'mono'},sourceLabel)),
      prov.note?h('div',{class:'note'},prov.note):null)));

  app.appendChild(panel('panel-baseline','①','Baseline 对照','单 LLM 会怎么说',
    '并置历史经验库召回（agent_kind=baseline），看左栏「一坨泛泛建议」与右栏「多角色 + 冲突 + 裁决链」的对照。',
    ix.of('baseline_judgment').length?ix.of('baseline_judgment').sort(byTime).map(e=>findingCard(e,ix,true))
      :[emptyState('本 run 无 baseline 事件','structure STEP 未注入历史经验对照，或 experience.json 为空。')]));
  const swarm=[...ix.of('reviewer_judgment')].sort(byTime);
  app.appendChild(panel('panel-swarm','②','Reviewer 蜂群时间线','多角色并行发现',
    '按物理时序排列各角色 finding，展开看对抗性独立推演；同一缺陷被多角色独立命中 = 蜂群价值。',
    swarm.length?swarm.map(e=>findingCard(e,ix,false)):[emptyState('本 run 无 reviewer_judgment 事件','评审未产出结构化 finding。')]));
  app.appendChild(panel('panel-conflict','③','冲突地图','张力分类（非普通分歧）',
    '冲突建模成 6 类张力，区分共识收敛与需裁决的分歧；finding_refs 可点回上游发现。',
    cflN?ix.of('conflict').map(e=>conflictCard(e,ix)):[emptyState('本 run 无 conflict 事件','conflict STEP 未产出结构化冲突。')]));
  app.appendChild(panel('panel-decision','④','作者裁决','谁拍的板（决策者明示）',
    '每条裁决标 decision_maker：绿=人类 / 橙=AI 代拟 / 蓝=编辑 Agent。不藏 ai_simulated。',
    decs.length?decs.map(e=>decisionCard(e,ix)):[emptyState('本 run 无 decision 事件','conflict STEP 未产出裁决。')]));
  const revEvents=ix.of('revision');
  const revGaps=(data.gaps||[]).filter(g=>/revis|revise|worker|verifier/i.test(g.field+' '+g.reason));
  app.appendChild(panel('panel-revision','⑤','修改验收','Worker 改 / Verifier 核（四态）',
    'before/after 对照 + verifier_state 四态徽章，每条修改 enacts→ 触发它的裁决。',
    revEvents.length?revEvents.map(e=>revisionCard(e,ix))
      :[emptyState('本 run 无 revision 事件 —— revise 简化跳过',
          'revise_report.md:3 明标「不跑 Worker/Verifier 改写论文」，无 paper_revised.md。'+(revGaps.length?(' 详见缺口登记：'+revGaps.map(g=>g.field).join(' / ')):''))]));
  app.appendChild(panel('panel-gaps','⚑','缺口登记','学术诚信记分牌',
    'produced_by_agent 字段缺失绝不偷补，登记于此；inferred 须配推断依据。论文 Figure 1 级可信度根基。',
    gapList(data)));

  app.appendChild(h('footer',{class:'foot'},
    'PaperSwarm 可审计事件模型 · schema v'+(data.schema_version||'?')+' · 生成于 '+(data.generated_at||'-')+' · 单文件零构建，file:// 离线可交付 · 数据契约 ',
    h('span',{class:'mono'},'resources/schema/events.schema.json')));

  renderNav(); setupScrollSpy();
}
function byTime(a,b){return(a.time||'').localeCompare(b.time||'');}
function panel(id,num,title,sub,desc,children){
  CURRENT.sections.push({id,name:title});
  const kids=Array.isArray(children)?children:[children];
  return h('section',{class:'panel',id},
    h('div',{class:'panel-head'},h('span',{class:'num'},num),h('h2',null,title),h('div',{class:'sub'},desc)),
    ...kids);
}
function emptyState(title,reason){
  return h('div',{class:'alert alert-warning'},h('div',{class:'alert-icon'},'⊘'),
    h('div',{class:'alert-body'},h('div',{style:'font-weight:600'},title),h('div',{class:'tiny',style:'opacity:.85;margin-top:3px'},reason)));
}
function gapList(data){
  const gaps=data.gaps||[];
  if(!gaps.length)return h('div',{class:'alert alert-success'},h('div',{class:'alert-icon'},'✓'),h('div',{class:'alert-body'},'无缺口登记。'));
  return h('div',{class:'list-group'},...gaps.map(g=>h('div',{class:'list-item'},
    h('div',{class:'list-item-icon'},'⚠'),
    h('div',{class:'list-item-content'},h('div',{class:'list-item-title'},g.field),
      h('div',{class:'list-item-subtitle'},g.reason,
        g.fix_step?h('div',{class:'tiny',style:'margin-top:5px'},h('span',{class:'lab'},'修复'),g.fix_step):null)),
    h('div',{class:'list-item-value'},g.event_id||'run'))));
}
function renderNav(){
  const nav=document.getElementById('nav-process'); nav.innerHTML='';
  const labels={'panel-baseline':'Baseline','panel-swarm':'蜂群','panel-conflict':'冲突','panel-decision':'裁决','panel-revision':'修改','panel-gaps':'缺口'};
  (CURRENT.sections||[]).forEach(s=>{
    const cnt=typeIdCount(s.id);
    nav.appendChild(h('span',{class:'chip','data-target':s.id,onclick:()=>document.getElementById(s.id)?.scrollIntoView({behavior:'smooth',block:'start'})},
      labels[s.id]||s.name,h('span',{class:'cnt'},cnt)));
  });
}
function typeIdCount(id){
  const m={'panel-baseline':'baseline_judgment','panel-swarm':'reviewer_judgment','panel-conflict':'conflict','panel-decision':'decision','panel-revision':'revision'};
  if(id==='panel-gaps')return(CURRENT.ix.data.gaps||[]).length;
  return CURRENT.ix.of(m[id]||'').length;
}
function setupScrollSpy(){
  if(!CURRENT.sections.length)return;
  const chips=[...document.querySelectorAll('#nav-process .chip')];
  const obs=new IntersectionObserver((entries)=>{
    entries.forEach(en=>{if(en.isIntersecting){
      const id=en.target.id;
      chips.forEach(c=>c.classList.toggle('chip-active',c.dataset.target===id));
    }});
  },{rootMargin:'-30% 0px -60% 0px',threshold:0});
  CURRENT.sections.forEach(s=>{const el=document.getElementById(s.id);if(el)obs.observe(el);});
}
let toastT;
function toast(msg,ico){
  const t=document.getElementById('toast');
  document.getElementById('toast-msg').textContent=msg;
  t.querySelector('.ico').textContent=ico||'✓';
  t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2400);
}
function loadFile(file){
  if(!file)return;const r=new FileReader();
  r.onload=()=>{try{
    const data=JSON.parse(r.result);
    if(!data.events||!Array.isArray(data.events))throw new Error('缺少 events 数组');
    render(data,file.name);toast('已加载 '+file.name+'（'+data.events.length+' 事件）','↻');
  }catch(err){toast('解析失败：'+err.message,'⚠');}};
  r.onerror=()=>toast('读取文件失败','⚠');
  r.readAsText(file,'utf-8');
}
function boot(){
  let data=null;const node=document.getElementById('embedded-events');
  try{data=JSON.parse(node.textContent.trim());}catch(e){}
  if(data&&data.events){render(data,'内嵌 demo.events.json（manual_demo）');return;}
  fetch('events.json').then(r=>r.json()).then(d=>render(d,'events.json'))
    .catch(()=>{document.getElementById('app').innerHTML='<div class="alert alert-error"><div class="alert-icon">⚠</div><div class="alert-body">未能加载事件数据。点导航「加载数据」手动选择 events.json。</div></div>';});
}
document.getElementById('file-input').addEventListener('change',ev=>loadFile(ev.target.files[0]));
boot();
</script>
</body>
